<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - FishMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <header class="bg-blue-600 text-white shadow">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    <h1 class="text-2xl font-bold">🐟 FishMarket</h1>
    <nav>
      <ul class="flex space-x-6">
        <li><a href="admin-panel.html" class="hover:text-yellow-300">Dashboard</a></li>
        <li><a href="users.html" class="hover:text-yellow-300">Users</a></li>
        <li><a href="listing.html" class="hover:text-yellow-300">Listings</a></li>
        <li><a href="reports.html" class="hover:text-yellow-300">Reports</a></li>
      </ul>
    </nav>
  </div>
</header>


  <!-- Content -->
  <section class="container mx-auto py-12 px-6">
    <h2 class="text-3xl font-bold mb-6">Manage Users</h2>

    <div class="bg-white shadow rounded-lg p-6">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-100">
            <th class="p-3">User ID</th>
            <th class="p-3">Name</th>
            <th class="p-3">Role</th>
            <th class="p-3">Status</th>
            <th class="p-3">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t">
            <td class="p-3">U-001</td>
            <td class="p-3">Juan Dela Cruz</td>
            <td class="p-3">Seller</td>
            <td class="p-3 text-green-600">Active</td>
            <td class="p-3 space-x-2">
              <button class="bg-yellow-400 px-3 py-1 rounded hover:bg-yellow-500">Suspend</button>
              <button class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Remove</button>
            </td>
          </tr>
          <tr class="border-t">
            <td class="p-3">U-002</td>
            <td class="p-3">Maria Santos</td>
            <td class="p-3">Buyer</td>
            <td class="p-3 text-green-600">Active</td>
            <td class="p-3 space-x-2">
              <button class="bg-yellow-400 px-3 py-1 rounded hover:bg-yellow-500">Suspend</button>
              <button class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</body>
</html>
